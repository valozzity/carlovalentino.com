[build]
  command = "node build.js"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/shop-images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
