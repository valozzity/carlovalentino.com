<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carlo Valentino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #787878;
      --green: #2dc437;
      --muted: #5a5a5a;
      --dark:  #1e1e1e;
      --border:#606060;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 28px 28px 36px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 28px;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(48px, 11.6vw, 999px);
      line-height: 1;
      letter-spacing: -.01em;
      text-transform: lowercase;
      color: var(--green);
      white-space: nowrap;
    }

    .sub {
      margin-top: 14px;
      font-weight: 300;
      font-size: clamp(11px, 1.1vw, 16px);
      letter-spacing: .22em;
      color: var(--muted);
      line-height: 1.6;
      text-transform: lowercase;
    }

    /* ── LOOPS FORM — override all inline styles ── */
    .newsletter-form-container {
      width: 100%;
      max-width: 480px;
    }

    .newsletter-form {
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      width: 100% !important;
      border: 1px solid var(--border);
    }

    .newsletter-form-input {
      flex: 1 !important;
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      outline: none;
      padding: 12px 18px !important;
      font-family: 'Nunito', sans-serif !important;
      font-weight: 300 !important;
      font-size: 14px !important;
      color: #e0e0e0 !important;
      width: auto !important;
      max-width: none !important;
      min-width: 0 !important;
      margin: 0 !important;
    }

    .newsletter-form-input::placeholder { color: var(--border) !important; }

    .newsletter-form-button,
    .newsletter-loading-button {
      font-family: 'Nunito', sans-serif !important;
      font-weight: 800 !important;
      font-size: 12px !important;
      letter-spacing: .2em;
      text-transform: lowercase;
      background: transparent !important;
      color: var(--green) !important;
      border: none !important;
      border-left: 1px solid var(--border) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 12px 20px !important;
      cursor: pointer;
      white-space: nowrap;
      height: auto !important;
      width: auto !important;
      max-width: none !important;
      transition: background .15s, color .15s;
    }

    .newsletter-form-button:hover {
      background: var(--green) !important;
      color: var(--dark) !important;
    }

    .newsletter-success,
    .newsletter-error {
      margin-top: 10px;
      display: none;
      align-items: center;
    }

    .newsletter-success-message {
      font-family: 'Nunito', sans-serif !important;
      font-size: 11px !important;
      letter-spacing: .18em;
      text-transform: lowercase;
      color: var(--green) !important;
    }

    .newsletter-error-message {
      font-family: 'Nunito', sans-serif !important;
      font-size: 11px !important;
      letter-spacing: .18em;
      text-transform: lowercase;
      color: #d44 !important;
    }

    .newsletter-back-button {
      font-family: 'Nunito', sans-serif !important;
      font-size: 11px !important;
      letter-spacing: .15em;
      text-transform: lowercase;
      color: var(--muted) !important;
      background: transparent !important;
      border: none !important;
      cursor: pointer;
      margin: 10px 0 0 !important;
      padding: 0 !important;
      display: none;
    }

    .newsletter-back-button:hover { text-decoration: underline; }
  </style>
</head>
<body>

<main>
  <h1>carlo valentino</h1>
  <p class="sub">
    sign up for the newsletter. artwork releases, upcoming shows<br>
    thoughts and such.
  </p>
</main>

<div class="newsletter-form-container">
  <form class="newsletter-form" action="https://app.loops.so/api/newsletter-form/cmikvu5m35hz5180ifhj0myon" method="POST">
    <input class="newsletter-form-input" placeholder="you@example.com" required type="email" name="newsletter-form-input">
    <button type="submit" class="newsletter-form-button">subscribe</button>
    <button type="button" class="newsletter-loading-button" style="display:none">...</button>
  </form>
  <div class="newsletter-success" style="display:none">
    <p class="newsletter-success-message">thanks for signing up, cool stuff incoming.</p>
  </div>
  <div class="newsletter-error" style="display:none">
    <p class="newsletter-error-message">oops! something went wrong, please try again</p>
  </div>
  <button class="newsletter-back-button" type="button" style="display:none">← back</button>
</div>

<script>
function submitHandler(event) {
  event.preventDefault();
  var container = event.target.parentNode;
  var form = container.querySelector(".newsletter-form");
  var formInput = container.querySelector(".newsletter-form-input");
  var success = container.querySelector(".newsletter-success");
  var errorContainer = container.querySelector(".newsletter-error");
  var errorMessage = container.querySelector(".newsletter-error-message");
  var backButton = container.querySelector(".newsletter-back-button");
  var submitButton = container.querySelector(".newsletter-form-button");
  var loadingButton = container.querySelector(".newsletter-loading-button");

  const rateLimit = () => {
    errorContainer.style.display = "flex";
    errorMessage.innerText = "too many signups, please try again in a little while";
    submitButton.style.display = "none";
    formInput.style.display = "none";
    backButton.style.display = "block";
  };

  var time = new Date();
  var timestamp = time.valueOf();
  var previousTimestamp = localStorage.getItem("loops-form-timestamp");
  if (previousTimestamp && Number(previousTimestamp) + 60000 > timestamp) {
    rateLimit();
    return;
  }
  localStorage.setItem("loops-form-timestamp", timestamp);

  submitButton.style.display = "none";
  loadingButton.style.display = "flex";

  var formBody = "userGroup=&mailingLists=&email=" + encodeURIComponent(formInput.value);

  fetch(event.target.action, {
    method: "POST",
    body: formBody,
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
  })
    .then((res) => [res.ok, res.json(), res])
    .then(([ok, dataPromise, res]) => {
      if (ok) {
        success.style.display = "flex";
        form.reset();
      } else {
        dataPromise.then(data => {
          errorContainer.style.display = "flex";
          errorMessage.innerText = data.message ? data.message : res.statusText;
        });
      }
    })
    .catch(error => {
      if (error.message === "Failed to fetch") { rateLimit(); return; }
      errorContainer.style.display = "flex";
      if (error.message) errorMessage.innerText = error.message;
      localStorage.setItem("loops-form-timestamp", '');
    })
    .finally(() => {
      formInput.style.display = "none";
      loadingButton.style.display = "none";
      backButton.style.display = "block";
    });
}

function resetFormHandler(event) {
  var container = event.target.parentNode;
  var formInput = container.querySelector(".newsletter-form-input");
  var success = container.querySelector(".newsletter-success");
  var errorContainer = container.querySelector(".newsletter-error");
  var errorMessage = container.querySelector(".newsletter-error-message");
  var backButton = container.querySelector(".newsletter-back-button");
  var submitButton = container.querySelector(".newsletter-form-button");

  success.style.display = "none";
  errorContainer.style.display = "none";
  errorMessage.innerText = "oops! something went wrong, please try again";
  backButton.style.display = "none";
  formInput.style.display = "flex";
  submitButton.style.display = "flex";
}

var formContainers = document.getElementsByClassName("newsletter-form-container");
for (var i = 0; i < formContainers.length; i++) {
  var formContainer = formContainers[i];
  if (formContainer.classList.contains('newsletter-handlers-added')) continue;
  formContainer.querySelector(".newsletter-form").addEventListener("submit", submitHandler);
  formContainer.querySelector(".newsletter-back-button").addEventListener("click", resetFormHandler);
  formContainer.classList.add("newsletter-handlers-added");
}
</script>

</body>
</html>
